apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskmanager-app
  labels:
    app: taskmanager-app
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: taskmanager-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
