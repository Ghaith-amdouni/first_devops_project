spring:
  application:
    name: taskmanager

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    # Development fallback only. Set JWT_SECRET in Docker/Kubernetes for real deployments.
    secret: ${JWT_SECRET:dGFza21hbmFnZXItZGV2LWp3dC1zZWNyZXQtdXNlLWVudi1vdmVycmlkZS0xMjM0NTY3ODkw}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
