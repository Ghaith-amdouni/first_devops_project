          "targets": [
            {
              "expr": "sum by (uri) (rate(http_server_requests_seconds_count{job=\"taskmanager-app\",uri!=\"/actuator/prometheus\"}[5m]))",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "barAlignment": 0,
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false,
                "insertNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                },
                "axisPlacement": "auto",
                "axisLabel": "",
                "axisColorMode": "text",
                "scaleDistribution": {
                  "type": "linear"
                },
                "axisCenteredZero": false,
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["lastNotNull"]
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          }
        },
