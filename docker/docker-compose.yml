version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  taskmanager-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taskmanager
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dGFza21hbmFnZXItZGV2LWp3dC1zZWNyZXQtdXNlLWVudi1vdmVycmlkZS0xMjM0NTY3ODkw}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
